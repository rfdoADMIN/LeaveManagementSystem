<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เปลี่ยนรหัสผ่านใหม่ | ระบบทะเบียนรับใบลาพนักงาน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-canvas: #f4faf7;
            --bg-card: #ffffff;
            --color-primary: #4f7a68;
            --color-primary-deep: #365d4e;
            --text-dark: #33413b;
            --text-muted: #7c8b84;
            --border-color: #e3ede7;
            --error-color: #d97878;
            --success-color: #5ab385;
            --radius-md: 14px;
        }

        * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg-canvas); color: var(--text-dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

        .card { width: 100%; max-width: 420px; background: var(--bg-card); padding: 40px 32px; border-radius: var(--radius-md); box-shadow: 0 20px 50px rgba(79, 122, 104, 0.12); }
        h2 { font-size: 24px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; text-align: center; }
        .subtitle { color: var(--text-muted); font-size: 14px; font-weight: 300; margin-bottom: 32px; text-align: center; }

        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; margin-bottom: 7px; font-size: 13px; color: var(--text-muted); font-weight: 600; }
        
        input { width: 100%; padding: 13px 16px; border: 1.5px solid var(--border-color); border-radius: var(--radius-md); font-size: 15px; color: var(--text-dark); background-color: #fbfdfc; transition: all 0.2s; }
        input:focus { border-color: var(--color-primary); background-color: #fff; box-shadow: 0 0 0 4px rgba(79, 122, 104, 0.1); outline: none; }
        input:disabled { background-color: #f0f4f2; color: #99a6a0; cursor: not-allowed; }

        .message-box { display: none; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; padding: 11px 14px; border-radius: var(--radius-md); margin-bottom: 18px; }
        .message-box.error { display: flex; background: #fdf3f3; border: 1px solid #f3d9d9; color: var(--error-color); }
        .message-box.success { display: flex; background: #edf9f2; border: 1px solid #ccefdc; color: var(--success-color); }

        button[type="submit"] { width: 100%; padding: 14px; border: none; border-radius: var(--radius-md); font-size: 15.5px; font-weight: 600; color: white; background-color: var(--color-primary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        button[type="submit"]:hover { background-color: var(--color-primary-deep); transform: translateY(-1px); }
        button[type="submit"]:disabled { background-color: #cddcd4; cursor: not-allowed; transform: none; }

        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <h2>ตั้งรหัสผ่านใหม่</h2>
        <div class="subtitle">เพื่อความปลอดภัย กรุณาเปลี่ยนรหัสผ่านเริ่มต้นก่อนเข้าใช้งาน</div>

        <div class="message-box" id="msgBox">
            <span id="msgIcon">⚠️</span><span id="msgText">เกิดข้อผิดพลาด</span>
        </div>

        <form id="changePasswordForm">
            <div class="input-group">
                <label for="empId">รหัสพนักงาน</label>
                <input type="text" id="empId" disabled>
            </div>
            <div class="input-group">
                <label for="oldPassword">รหัสผ่านเดิม</label>
                <input type="password" id="oldPassword" value="5662" disabled required>
            </div>
            <div class="input-group">
                <label for="newPassword">รหัสผ่านใหม่</label>
                <input type="password" id="newPassword" placeholder="กำหนดรหัสผ่านใหม่" required minlength="4">
            </div>
            <div class="input-group">
                <label for="confirmPassword">ยืนยันรหัสผ่านใหม่</label>
                <input type="password" id="confirmPassword" placeholder="กรอกรหัสผ่านใหม่อีกครั้ง" required minlength="4">
            </div>
            <button type="submit" id="submitBtn">
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnLabel">บันทึกรหัสผ่านใหม่</span>
            </button>
        </form>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzrsqpxZU-7VZTu2d-YHlNHr8vunweyG8N03m811Df2KmGqVcNlbQBnLzhDvAeybvyI/exec";

        const empId = localStorage.getItem('loggedInEmpId');
        if (!empId) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('empId').value = empId;
        }

        function showMessage(msg, type) {
            const box = document.getElementById('msgBox');
            document.getElementById('msgText').innerText = msg;
            box.className = 'message-box ' + type;
            document.getElementById('msgIcon').innerText = type === 'success' ? '✅' : '⚠️';
        }

        document.getElementById('changePasswordForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            document.getElementById('msgBox').className = 'message-box';

            const btn = document.getElementById('submitBtn');
            const btnLabel = document.getElementById('btnLabel');
            const btnSpinner = document.getElementById('btnSpinner');
            
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword === "5662") {
                showMessage("ไม่สามารถใช้รหัสผ่านเริ่มต้นเป็นรหัสผ่านใหม่ได้", "error");
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage("รหัสผ่านใหม่และช่องยืนยันไม่ตรงกัน", "error");
                return;
            }

            btnLabel.innerText = "กำลังบันทึกข้อมูล...";
            btnSpinner.style.display = "inline-block";
            btn.disabled = true;

            try {
                const payload = { action: "changePassword", username: empId, oldPassword: oldPassword, newPassword: newPassword };
                const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();

                if (result.status === "success") {
                    showMessage("เปลี่ยนรหัสผ่านสำเร็จแล้ว กำลังนำคุณเข้าสู่ระบบ...", "success");
                    setTimeout(() => {
                        window.location.href = 'Leave.html';
                    }, 2000);
                } else {
                    showMessage(result.message || "ไม่สามารถเปลี่ยนรหัสผ่านได้", "error");
                    btn.disabled = false;
                    btnLabel.innerText = "บันทึกรหัสผ่านใหม่";
                    btnSpinner.style.display = "none";
                }
            } catch (error) {
                showMessage("เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้ง", "error");
                btn.disabled = false;
                btnLabel.innerText = "บันทึกรหัสผ่านใหม่";
                btnSpinner.style.display = "none";
            }
        });
    </script>
</body>
</html>
